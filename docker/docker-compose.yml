version: '3.9'

services:
  backend:
    build:
      context: ..                          # repo root
      dockerfile: docker/Dockerfile.backend
    container_name: edgedeploy-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist uploads & converted models on the host
      - ../storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - ONNX2TF_NO_VERSION_CHECK=1
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
